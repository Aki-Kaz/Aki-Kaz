<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>しりとリンク</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="intro-container">
        <h1>しりとリンク</h1>
        <p>このゲームでは、しりとりを使って言葉を円形に並べます。言葉を入力して送信すると、次の言葉は前の言葉の終わりの文字から始まる必要があります。</p>
        <p>最初の言葉の頭文字と最後の言葉の終わりの文字が一致すると、円が完成します。</p>
        <button id="start-game">ゲーム開始</button>
    </div>
    <div id="game-container" style="display: none;">
        <h1>しりとリンク</h1>
        <canvas id="game-canvas"></canvas>
        <input type="text" id="input-word" placeholder="言葉を入力してください">
        <button id="submit-word">送信</button>
        <div id="timer">タイマー: <span id="time-left">60</span>秒</div>
        <div id="score">スコア: <span id="score-value">0</span></div>
        <div id="hint">ヒント: <span id="hint-value"></span></div>
        <div id="completed-circles"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
